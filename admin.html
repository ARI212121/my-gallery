<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול - הגלריה שלי</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; margin: 0; }
        .container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; font-size: 28px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .input-group { margin-bottom: 20px; }
        input[type="text"], input[type="file"], button { 
            display: block; width: 100%; padding: 15px; 
            box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; transition: border-color 0.3s;
        }
        input[type="text"]:focus { border-color: #3498db; outline: none; }
        button { background-color: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 10px; }
        button:hover { background-color: #219653; }
        #loader { display: none; background-color: #e8f8f5; color: #16a085; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-weight: bold; border: 1px solid #1abc9c; }
        iframe { width: 100%; height: 600px; border: 2px solid #ddd; margin-top: 20px; border-radius: 8px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    <h2>לוח בקרה - מנהל מערכת ⚙️</h2>
    
    <div class="input-group">
        <input type="text" id="projectName" placeholder="שם הפרויקט (למשל: אתר הראווה שלי)">
    </div>
    <div class="input-group">
        <input type="file" id="fileInput">
    </div>
    
    <button onclick="uploadData()">העלה קובץ לשרת</button>
    <br>
    <div id="loader">מכווץ ומעלה קובץ... 🚀 זה ייקח רגע</div>

    <hr style="border:0; border-top:1px solid #eee; margin:30px 0;">
    <h3 style="color: #7f8c8d;">תצוגה מקדימה לאתר הלקוחות:</h3>
    <iframe id="sitePreview" src="index.html"></iframe>
</div>

<script>
// --- החלף כאן בכתובת השרת! ---
const gasUrl = 'https://script.google.com/macros/s/AKfycbzhQ3D6LYDGmN2-WgfBSyBcQuzu6nLdxE4VmFRT2anbmzz5SU9RnTlEBEXDFxw2CS_e/exec';

async function uploadData() {
    const projectName = document.getElementById('projectName').value;
    const fileInput = document.getElementById('fileInput');
    
    if (!projectName || !fileInput.files[0]) { alert('נא למלא שם פרויקט ולבחור קובץ!'); return; }

    document.getElementById('loader').style.display = 'block';

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async function(e) {
        const base64Data = e.target.result.split(',')[1];
        let thumbData = "";

        if (file.type.startsWith('image/')) {
            const img = new Image();
            img.src = e.target.result;
            await new Promise(r => img.onload = r); 
            
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 400; 
            let width = img.width;
            let height = img.height;
            
            if (width > MAX_WIDTH) {
                height = height * (MAX_WIDTH / width);
                width = MAX_WIDTH;
            }
            
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            thumbData = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
        }

        const formData = new URLSearchParams();
        formData.append('action', 'upload');
        formData.append('projectName', projectName);
        formData.append('fileData', base64Data);
        formData.append('fileName', file.name);
        if (thumbData) formData.append('thumbData', thumbData); 

        try {
            const response = await fetch(gasUrl, { method: 'POST', body: formData });
            const data = await response.json();
            if(data.status === "success") {
                alert('✅ הועלה בהצלחה!');
                document.getElementById('fileInput').value = '';
                refreshPreview();
            } else { throw new Error(data.message); }
        } catch (err) { alert('❌ שגיאה בהעלאה: ' + err.message); }
        document.getElementById('loader').style.display = 'none';
    };
    reader.readAsDataURL(file);
}

function refreshPreview() { 
    const preview = document.getElementById('sitePreview');
    if(preview) {
        preview.src = 'index.html?t=' + new Date().getTime(); 
    }
}
</script>
</body>
</html>
