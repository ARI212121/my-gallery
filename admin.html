<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול - הגלריה שלי</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        input[type="text"], input[type="file"], button { 
            display: block; width: 100%; margin: 10px 0; padding: 12px; 
            box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; font-size: 16px;
        }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #45a049; }
        #loader { display: none; background-color: #fff3cd; color: #856404; padding: 10px; border-radius: 4px; text-align: center; margin-bottom: 15px; font-weight: bold; border: 1px solid #ffeeba; }
        iframe { width: 100%; height: 500px; border: 2px dashed #ddd; margin-top: 20px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ניהול קבצים 📁</h2>
    
    <input type="text" id="projectName" placeholder="שם הפרויקט (למשל: אתר_ראווה)">
    <input type="file" id="fileInput">
    <button onclick="uploadData()">העלה קובץ לשרת</button>
    
    <div id="loader">מכווץ ומעלה קובץ... 🚀</div>

    <hr>
    <h3>תצוגה מקדימה:</h3>
    <iframe id="sitePreview" src="index.html"></iframe>
</div>

<script>
const gasUrl = 'https://script.google.com/macros/s/AKfycbzhQ3D6LYDGmN2-WgfBSyBcQuzu6nLdxE4VmFRT2anbmzz5SU9RnTlEBEXDFxw2CS_e/exec';

async function uploadData() {
    const projectName = document.getElementById('projectName').value;
    const fileInput = document.getElementById('fileInput');
    
    if (!projectName || !fileInput.files[0]) { alert('נא למלא שם פרויקט ולבחור קובץ!'); return; }

    document.getElementById('loader').style.display = 'block';
    document.getElementById('loader').innerText = 'מכווץ ומעלה קובץ... 🚀';

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async function(e) {
        const base64Data = e.target.result.split(',')[1];
        let thumbData = "";

        // כיווץ תמונות לתמונה ממוזערת
        if (file.type.startsWith('image/')) {
            const img = new Image();
            img.src = e.target.result;
            await new Promise(r => img.onload = r); 
            
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 400; 
            let width = img.width;
            let height = img.height;
            
            if (width > MAX_WIDTH) {
                height = height * (MAX_WIDTH / width);
                width = MAX_WIDTH;
            }
            
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            thumbData = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
        }

        const formData = new URLSearchParams();
        formData.append('action', 'upload');
        formData.append('projectName', projectName);
        formData.append('fileData', base64Data);
        formData.append('fileName', file.name);
        if (thumbData) formData.append('thumbData', thumbData); 

        try {
            const response = await fetch(gasUrl, { method: 'POST', body: formData });
            const data = await response.json();
            if(data.status === "success") {
                alert('✅ הועלה בהצלחה!');
                document.getElementById('fileInput').value = '';
                refreshPreview();
            } else { throw new Error(data.message); }
        } catch (err) { alert('❌ שגיאה בהעלאה: ' + err.message); }
        document.getElementById('loader').style.display = 'none';
    };
    reader.readAsDataURL(file);
}

function refreshPreview() { 
    const preview = document.getElementById('sitePreview');
    if(preview) {
        preview.src = 'index.html?t=' + new Date().getTime(); 
    }
}
</script>
</body>
</html>
