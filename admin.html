<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת ניהול - הגלריה שלי</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { color: #4361ee; border-bottom: 2px solid #ff477e; padding-bottom: 10px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #e9ecef; border-radius: 8px; box-sizing: border-box; }
        button { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; width: 100%; }
        .btn-upload { background: #4361ee; } .btn-upload:hover { background: #3f37c9; }
        .btn-delete { background: #e63946; padding: 8px 15px; width: auto; } .btn-delete:hover { background: #d62828; }
        .file-list { list-style: none; padding: 0; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .file-info { display: flex; flex-direction: column; }
        .project-badge { font-size: 12px; background: #eee; padding: 3px 8px; border-radius: 10px; color: #555; display: inline-block; margin-bottom: 5px; width: fit-content; }
        #loader { display: none; text-align: center; color: #4361ee; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>✨ העלאת קובץ חדש</h2>
        <input type="text" id="projectName" placeholder="שם הפרויקט (למשל: יצירות קיץ, מסמכים חשובים)">
        <input type="file" id="fileInput"> <button class="btn-upload" onclick="uploadData()">העלה לאתר</button>
        <div id="loader">טוען נתונים... ⏳</div>
    </div>

    <div class="card">
        <h2>🗑️ ניהול קבצים קיימים</h2>
        <button onclick="loadFiles()" style="background:#2a9d8f; margin-bottom:15px;">🔄 רענן רשימה</button>
        <ul class="file-list" id="fileList"></ul>
    </div>

    <script>
        // --- החלף לכתובת הסקריפט האמיתית שלך! ---
        const gasUrl = 'https://script.google.com/macros/s/AKfycbzhQ3D6LYDGmN2-WgfBSyBcQuzu6nLdxE4VmFRT2anbmzz5SU9RnTlEBEXDFxw2CS_e/exec';

        // העלאת קובץ
        async function uploadData() {
            const projectName = document.getElementById('projectName').value;
            const fileInput = document.getElementById('fileInput');
            
            if (!projectName || !fileInput.files[0]) { alert('נא למלא שם פרויקט ולבחור קובץ!'); return; }

            document.getElementById('loader').style.display = 'block';
            document.getElementById('loader').innerText = 'מעלה קובץ... 🚀';

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async function(e) {
                const base64Data = e.target.result.split(',')[1];
                const formData = new URLSearchParams();
                formData.append('action', 'upload');
                formData.append('projectName', projectName);
                formData.append('fileData', base64Data);
                formData.append('fileName', file.name);

                try {
                    const response = await fetch(gasUrl, { method: 'POST', body: formData });
                    const data = await response.json();
                    if(data.status === "success") {
                        alert('✅ הועלה בהצלחה!');
                        document.getElementById('fileInput').value = '';
                        loadFiles(); // רענון הרשימה אוטומטית
                    } else { throw new Error(data.message); }
                } catch (err) { alert('❌ שגיאה בהעלאה: ' + err.message); }
                document.getElementById('loader').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        // טעינת רשימת הקבצים למחיקה
        async function loadFiles() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('loader').innerText = 'מושך נתונים... ⏳';
            try {
                const response = await fetch(gasUrl);
                const data = await response.json();
                const list = document.getElementById('fileList');
                list.innerHTML = '';

                data.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerHTML = `
                        <div class="file-info">
                            <span class="project-badge">📁 ${item.projectName}</span>
                            <strong>${item.fileName}</strong>
                        </div>
                        <button class="btn-delete" onclick="deleteFile('${item.githubPath}', ${item.rowIndex})">מחק</button>
                    `;
                    list.appendChild(li);
                });
            } catch (err) { console.error('Error fetching data:', err); }
            document.getElementById('loader').style.display = 'none';
        }

        // מחיקת קובץ
        async function deleteFile(githubPath, rowIndex) {
            if(!confirm('האם אתה בטוח שברצונך למחוק קובץ זה לצמיתות?')) return;
            
            document.getElementById('loader').style.display = 'block';
            document.getElementById('loader').innerText = 'מוחק קובץ... 🗑️';

            const formData = new URLSearchParams();
            formData.append('action', 'delete');
            formData.append('githubPath', githubPath);
            formData.append('rowIndex', rowIndex);

            try {
                const response = await fetch(gasUrl, { method: 'POST', body: formData });
                const data = await response.json();
                if(data.status === "success") {
                    alert('✅ נמחק בהצלחה!');
                    loadFiles(); // טוען מחדש את הרשימה
                } else { throw new Error(data.message); }
            } catch (err) { alert('❌ שגיאה במחיקה: ' + err.message); }
            document.getElementById('loader').style.display = 'none';
        }

        // טען קבצים כשהדף עולה
        window.onload = loadFiles;
    </script>
</body>
</html>
