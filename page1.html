<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>יעד התקדמות בזמן אמת</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      margin: 0;
    }
    .dashboard {
      background: white;
      padding: 50px;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      text-align: center;
      width: 400px;
    }
    h1 {
      color: #333;
      margin-bottom: 30px;
    }
    /* עיצוב גרף הטבעת */
    .progress-circle {
      width: 250px;
      height: 250px;
      border-radius: 50%;
      background: conic-gradient(#4caf50 0%, #e0e0e0 0%);
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 30px;
      transition: background 1.5s ease-in-out;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
    }
    .inner-circle {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    .percentage {
      font-size: 3em;
      font-weight: bold;
      color: #2c3e50;
    }
    .amount {
      font-size: 2.5em;
      font-weight: bold;
      color: #27ae60;
      margin-bottom: 10px;
      display: inline-block;
    }
    .goal {
      font-size: 1.2em;
      color: #7f8c8d;
    }
    /* אנימציית פעימה לסכום חדש */
    .pulse-animation {
      animation: pulse 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
      color: #f39c12; /* צבע מדגיש בעת קפיצת הסכום */
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="dashboard">
    <h1>התקדמות ליעד</h1>
    
    <div class="progress-circle" id="progressCircle">
      <div class="inner-circle">
        <div class="percentage" id="percentageDisplay">0%</div>
      </div>
    </div>
    
    <div class="amount" id="amountDisplay">0 ₪</div>
    <div class="goal">מתוך יעד של 1,100,000 ₪</div>
  </div>

  <script>
    // ***** הכנס כאן את הקישור לאפליקציית הרשת שקיבלת מ-Apps Script *****
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwEahT8jahOYMSv6JoZICSotCFdh24U1MjPM5wRhQOZcLwW_HAmssL2YIHnfAz6_1nG/exec'; 
    const GOAL_AMOUNT = 1100000;
    let currentTotal = -1; // מתחיל ממינוס 1 כדי להבטיח עדכון ראשוני

    async function fetchAndUpdateData() {
      try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        
        if (data && data.sum !== undefined) {
          const newTotal = data.sum;
          
          // בודק אם הסכום גדל
          if (newTotal > currentTotal) {
            updateUI(newTotal);
            currentTotal = newTotal;
          }
        }
      } catch (error) {
        console.error('שגיאה במשיכת הנתונים:', error);
      }
    }

    function updateUI(newTotal) {
      const amountEl = document.getElementById('amountDisplay');
      const percentageEl = document.getElementById('percentageDisplay');
      const circleEl = document.getElementById('progressCircle');

      // חישוב אחוזים
      let percent = (newTotal / GOAL_AMOUNT) * 100;
      if (percent > 100) percent = 100; // מגביל ל-100% מבחינה ויזואלית

      // עדכון מספרים
      amountEl.innerText = newTotal.toLocaleString() + ' ₪';
      percentageEl.innerText = Math.round(percent) + '%';

      // עדכון גרף טבעת
      circleEl.style.background = `conic-gradient(#4caf50 ${percent}%, #e0e0e0 ${percent}%)`;

      // הפעלת אנימציית "פעימה" רק אם זה לא העדכון הראשון (טעינת הדף)
      if (currentTotal !== -1) {
        amountEl.classList.remove('pulse-animation');
        void amountEl.offsetWidth; // טריק קטן כדי לאפס את האנימציה
        amountEl.classList.add('pulse-animation');
      }
    }

    // הפעלה ראשונית מיד עם טעינת הדף
    fetchAndUpdateData();

    // הפעלה מחזורית כל 5 שניות (5000 מילישניות)
    setInterval(fetchAndUpdateData, 5000);
  </script>

</body>
</html>
