<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הגלריה המתרחבת שלי</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            margin: 0;
            padding: 30px 10px;
            text-align: center;
        }
        h1 {
            color: #ff477e;
            font-size: 45px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }
        .subtitle {
            color: #555;
            font-size: 20px;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.7);
            display: inline-block;
            padding: 10px 25px;
            border-radius: 25px;
            margin-bottom: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .project-card {
            background-color: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(255, 71, 126, 0.3);
            border: 3px solid #ff477e;
        }
        .project-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
        }
        .project-title {
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        .loader {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 71, 126, 0.3);
            border-radius: 50%;
            border-top-color: #ff477e;
            animation: spin 1s linear infinite;
            margin-top: 50px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* חלון הגדלה */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); 
            backdrop-filter: blur(5px);
        }
        .modal-content {
            margin: 2% auto; display: block; max-width: 90%; max-height: 80vh;
            border-radius: 15px; box-shadow: 0 0 40px rgba(255, 71, 126, 0.5);
            object-fit: contain;
        }
        .modal-title {
            color: white; font-size: 30px; margin-top: 15px; text-shadow: 2px 2px 4px #000;
        }
        .close {
            position: absolute; top: 20px; right: 40px; color: white; 
            font-size: 50px; font-weight: bold; cursor: pointer;
        }
        .close:hover { color: #ff477e; }
    </style>
</head>
<body>

    <h1>הפרויקטים שלי</h1>
    <div class="subtitle">מתעדכן אוטומטית! לחץ על פרויקט כדי להגדיל</div>

    <div id="loadingIndicator" class="loader"></div>
    <div class="gallery-container" id="galleryGrid"></div>

    <div id="imageModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="expandedImg">
        <div class="modal-title" id="expandedTitle"></div>
    </div>

    <script>
        // --- החלף את הכתובת הזו בכתובת המלאה שקיבלת מגוגל סקריפט ---
      const gasUrl = 'https://script.google.com/macros/s/AKfycbzhQ3D6LYDGmN2-WgfBSyBcQuzu6nLdxE4VmFRT2anbmzz5SU9RnTlEBEXDFxw2CS_e/exec';
        // משיכת הנתונים בצורה הכי ישירה וסטנדרטית
        async function loadProjects() {
            try {
                const response = await fetch(gasUrl);
                const data = await response.json();
                
                document.getElementById('loadingIndicator').style.display = 'none';
                const grid = document.getElementById('galleryGrid');
                grid.innerHTML = ''; 

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    card.onclick = () => openModal(item.imageUrl, item.title);
                    
                    card.innerHTML = `
                        <img class="project-image" src="${item.imageUrl}" alt="${item.title}">
                        <div class="project-title">${item.title}</div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('loadingIndicator').style.display = 'none';
                document.getElementById('galleryGrid').innerHTML = '<h2 style="color:red;">שגיאה בטעינת הנתונים.</h2>';
            }
        }

        function openModal(imgSrc, imgTitle) {
            document.getElementById("imageModal").style.display = "block";
            document.getElementById("expandedImg").src = imgSrc;
            document.getElementById("expandedTitle").innerText = imgTitle;
        }

        function closeModal() {
            document.getElementById("imageModal").style.display = "none";
        }

        window.onclick = function(event) {
            const modal = document.getElementById("imageModal");
            if (event.target == modal) closeModal();
        }

        window.onload = loadProjects;
    </script>
</body>
</html>
