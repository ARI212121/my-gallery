<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARISH פיתוח תוכנה</title>
<!-- טעינת גופנים מגוגל -->
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&family=Heebo:wght@400;700&family=Rubik:wght@400;700&family=Varela+Round&display=swap" rel="stylesheet">
<style>
    :root {
        --main-color: #1abc9c;
        --bg-color-1: #f5f7fa;
        --text-color: #333333;
        --border-radius: 16px;
        --border-width: 2px;
        --shadow-depth: 10px;
        --shadow-color: rgba(0,0,0,0.08);
        --hover-shadow: 25px;
        --hover-scale: 1.05;
        --font-family: 'Segoe UI', Tahoma, sans-serif;
        --card-size: 240px;
        --title-size: 48px;
        --text-size: 18px;
        --card-bg: rgba(255, 255, 255, 0.9);
        --header-align: center;
    }
    
    /* דריסת צבעים במצב לילה */
    body.user-dark-mode {
        --bg-color-1: #121212;
        --text-color: #e0e0e0;
        --card-bg: #1e1e1e;
        --shadow-color: rgba(255,255,255,0.02);
    }

    body {
        font-family: var(--font-family);
        background: var(--bg-color-1);
        color: var(--text-color); margin: 0; padding: 20px 30px; min-height: 100vh;
        transition: background 0.5s, color 0.5s;
    }
    
    .top-toolbar { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; margin-bottom: 30px; background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px var(--shadow-color); border: 1px solid rgba(128,128,128,0.2); }
    .search-box { flex-grow: 1; max-width: 400px; padding: 12px 20px; border-radius: 20px; border: 2px solid #ccc; font-size: 16px; font-family: inherit; transition: 0.3s; background: transparent; color: var(--text-color); }
    .search-box:focus { outline: none; border-color: var(--main-color); }
    .tool-btn { background: transparent; color: var(--text-color); border: 2px solid #ccc; padding: 10px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; font-family: inherit; }
    .tool-btn:hover { border-color: var(--main-color); color: var(--main-color); }

    .site-header { text-align: var(--header-align); margin-bottom: 40px; }
    .site-header h1 { color: var(--main-color); font-size: var(--title-size); margin: 0; text-shadow: 1px 1px 3px rgba(0,0,0,0.1); }
    .site-header p { font-size: calc(var(--text-size) * 1.2); opacity: 0.8; }
    
    #loader { text-align: center; font-size: 1.5em; color: var(--main-color); margin: 50px 0; font-weight: bold; }
    
    .breadcrumbs { background: var(--card-bg); padding: 10px 20px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; font-size: var(--text-size); border: 1px solid rgba(128,128,128,0.2); }
    .breadcrumbs span { cursor: pointer; color: var(--main-color); transition: 0.3s; }
    .breadcrumbs span:hover { text-decoration: underline; color: var(--text-color); }
    .breadcrumbs .separator { margin: 0 10px; color: #888; cursor: default; }

    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--card-size), 1fr)); gap: 30px; }
    .gallery-grid.list-view { display: flex; flex-direction: column; gap: 15px; }
    
    .item-card, .folder-card {
        background: var(--card-bg);
        border-radius: var(--border-radius);
        padding: 20px; text-align: center; cursor: pointer;
        display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        border: var(--border-width) solid transparent;
        box-shadow: 0 var(--shadow-depth) calc(var(--shadow-depth)*2) var(--shadow-color);
        transition: all 0.3s ease;
        position: relative;
    }

    .gallery-grid.list-view .item-card, .gallery-grid.list-view .folder-card { flex-direction: row; justify-content: flex-start; text-align: right; padding: 15px; }
    .gallery-grid.list-view .item-image { width: 100px; height: 70px; margin-bottom: 0; margin-left: 20px; }
    .gallery-grid.list-view .folder-icon, .gallery-grid.list-view .file-icon { font-size: 40px; margin-bottom: 0; margin-left: 20px; }
    .gallery-grid.list-view .item-name, .gallery-grid.list-view .folder-name { flex-grow: 1; text-align: right; font-size: var(--text-size); }
    .gallery-grid.list-view .desc-text { display: none; }
    .gallery-grid.list-view .click-indicator { margin-top: 0; margin-right: auto; }
    .gallery-grid.list-view .html-preview-container { width: 100px; height: 70px; margin-bottom: 0; margin-left: 20px; }
    
    .anim-float:hover { transform: translateY(-10px); border-color: var(--main-color); box-shadow: 0 var(--hover-shadow) calc(var(--hover-shadow)*1.5) rgba(0,0,0,0.15); }
    .anim-zoom:hover { transform: scale(var(--hover-scale)); border-color: var(--main-color); box-shadow: 0 var(--hover-shadow) calc(var(--hover-shadow)*1.5) rgba(0,0,0,0.15); }
    .anim-3d { perspective: 1000px; transform-style: preserve-3d; }
    .anim-3d:hover { transform: rotateY(10deg) rotateX(5deg) scale(var(--hover-scale)); border-color: var(--main-color); box-shadow: -10px 10px 20px rgba(0,0,0,0.2); }
    .anim-none:hover { border-color: var(--main-color); }
    
    .text-anim-fade { animation: fadeIn 1s ease-in-out; }
    .text-anim-slide { animation: slideUp 0.8s ease-out; }
    .text-anim-bounce { animation: bounceIn 1s cubic-bezier(0.28, 0.84, 0.42, 1); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.3); } 50% { opacity: 1; transform: scale(1.05); } 70% { transform: scale(0.9); } 100% { transform: scale(1); } }

    .folder-icon { font-size: calc(var(--card-size) / 3); margin-bottom: 10px; }
    .folder-name { font-size: calc(var(--text-size) * 1.2); font-weight: bold; color: var(--main-color); }
    
    .link-card { background: linear-gradient(135deg, var(--main-color), #2c3e50); color: white; border: var(--border-width) solid rgba(255,255,255,0.3); }
    .link-card .item-name { color: white; font-size: calc(var(--text-size) * 1.2); }
    .link-card .desc-text { color: #ecf0f1; }
    .link-card .file-icon { color: white; font-size: calc(var(--card-size) / 4); }

    .item-image { width: 100%; height: calc(var(--card-size) * 0.7); object-fit: cover; border-radius: calc(var(--border-radius) / 2); margin-bottom: 15px; }
    .html-preview-container { width: 100%; height: calc(var(--card-size) * 0.7); overflow: hidden; border-radius: calc(var(--border-radius) / 2); margin-bottom: 15px; border: 1px solid #eee; }
    .html-preview-container iframe { width: 400%; height: 400%; border: none; transform: scale(0.25); transform-origin: top right; pointer-events: none; }
    
    .file-icon { font-size: calc(var(--card-size) / 4); margin-bottom: 15px; color: #95a5a6; }
    .item-name { font-size: var(--text-size); font-weight: bold; word-break: break-all; }
    .desc-text { font-size: calc(var(--text-size) * 0.85); opacity: 0.8; margin-top: 8px; line-height: 1.4; }
    .click-indicator { margin-top: 15px; font-size: calc(var(--text-size) * 0.75); color: var(--main-color); font-weight: bold; opacity: 0; transition: opacity 0.3s; background: rgba(255,255,255,0.9); padding: 5px 10px; border-radius: 20px; }
    .item-card:hover .click-indicator, .folder-card:hover .click-indicator { opacity: 1; }

    /* כפתור הורדה על כרטיסיות */
    .download-btn {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid #ccc;
        border-radius: 50%;
        width: 35px;
        height: 35px;
        display: flex;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        font-size: 18px;
        color: var(--text-color);
        transition: all 0.3s ease;
        z-index: 10;
        opacity: 0;
    }
    .item-card:hover .download-btn { opacity: 1; }
    .download-btn:hover { background: var(--main-color); color: white; border-color: var(--main-color); transform: scale(1.1); }

    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
    .modal-content { margin: auto; display: block; max-width: 90%; max-height: 70vh; margin-top: 5vh; border-radius: 12px; border: 3px solid var(--main-color); }
    .close { position: absolute; top: 20px; right: 40px; color: #fff; font-size: 50px; font-weight: bold; cursor: pointer; }
    .close:hover { color: var(--main-color); }
    #expandedTitle { text-align: center; color: white; margin-top: 15px; font-size: 24px; font-weight: bold; }
    #expandedDesc { text-align: center; color: #ccc; font-size: 18px; margin-top: 5px; }

    /* כפתור יצירת קשר צף */
    .floating-contact-btn {
        position: fixed; bottom: 30px; left: 30px;
        background: var(--main-color); color: white;
        padding: 15px 25px; border-radius: 50px;
        text-decoration: none; font-weight: bold; font-size: 18px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; z-index: 100;
        display: flex; align-items: center; gap: 8px;
    }
    .floating-contact-btn:hover { transform: scale(1.05); filter: brightness(1.1); color: white; }

    /* עיצוב מערכת הבינה המלאכותית (צ'אטבוט) */
    .floating-ai-btn {
        position: fixed; bottom: 30px; right: 30px;
        background: linear-gradient(45deg, #9b59b6, #8e44ad); color: white;
        padding: 15px 25px; border-radius: 50px; border: none;
        font-weight: bold; font-size: 18px; cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; z-index: 100;
        display: flex; align-items: center; gap: 8px; font-family: inherit;
    }
    .floating-ai-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
    
    .ai-chat-window {
        position: fixed; bottom: 90px; right: 30px; width: 350px; max-width: 90vw;
        background: var(--card-bg); border-radius: 16px; overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 101;
        display: none; flex-direction: column; border: 2px solid #9b59b6;
    }
    .ai-chat-header {
        background: linear-gradient(45deg, #9b59b6, #8e44ad); color: white;
        padding: 15px; font-weight: bold; font-size: 16px; display: flex;
        justify-content: space-between; align-items: center;
    }
    .ai-chat-messages {
        height: 350px; overflow-y: auto; padding: 15px;
        display: flex; flex-direction: column; gap: 10px; background: var(--bg-color-1);
    }
    .ai-msg, .user-msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.4; }
    .ai-msg { background: var(--card-bg); color: var(--text-color); align-self: flex-start; border-bottom-right-radius: 2px; border: 1px solid rgba(128,128,128,0.2); }
    .user-msg { background: var(--main-color); color: white; align-self: flex-end; border-bottom-left-radius: 2px; }
    
    .ai-chat-input-area { display: flex; padding: 10px; background: var(--card-bg); border-top: 1px solid rgba(128,128,128,0.1); }
    .ai-chat-input-area input { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; background: transparent; color: var(--text-color); font-family: inherit; font-size: 14px; }
    .ai-chat-input-area input:focus { outline: none; border-color: #9b59b6; }
    .ai-chat-input-area button { background: transparent; border: none; font-size: 24px; cursor: pointer; padding: 0 10px; color: #9b59b6; transition: 0.3s; }
    .ai-chat-input-area button:hover { transform: scale(1.1); }

    /* עיצובי AI חדשים */
    .ai-btn {
        background: linear-gradient(45deg, #9b59b6, #8e44ad); color: white; border: none; 
        padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; 
        transition: 0.3s; display: inline-block; text-align: center; font-family: inherit; font-size: 14px;
    }
    .ai-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(155, 89, 182, 0.4); }

    .ai-explainer-box {
        margin-top: 15px; padding: 15px; border-radius: 12px; background: rgba(155, 89, 182, 0.1); 
        border: 1px solid #9b59b6; color: white; font-size: 16px; text-align: right; 
        display: none; line-height: 1.5;
    }
</style>
</head>
<body>

<div class="top-toolbar" id="topToolbar">
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 חפש קובץ או תיקייה..." onkeyup="filterItems()">
    <button class="tool-btn" onclick="toggleListView()">🔲 החלף תצוגה</button>
    <button class="tool-btn" id="darkModeBtn" onclick="toggleDarkMode()">🌙 מצב לילה אישי</button>
</div>

<div class="site-header" id="headerSection">
    <h1 id="uiTitle">...</h1>
    <p id="uiSubtitle">...</p>
</div>

<div class="breadcrumbs" id="breadcrumbs" style="display:none;"></div>
<div id="loader">טוען נתונים...</div>
<div id="mainView" class="gallery-grid"></div>

<!-- כפתור מעבר לדף יצירת קשר -->
<a href="contact.html" class="floating-contact-btn">✉️ צור קשר</a>

<!-- צ'אט הבינה המלאכותית -->
<button class="floating-ai-btn" onclick="toggleAIChat()">✨ עוזר חכם</button>
<div id="aiChatWindow" class="ai-chat-window">
    <div class="ai-chat-header">
        <span>✨ עוזר וירטואלי - ARISH פיתוח תוכנה</span>
        <span onclick="toggleAIChat()" style="cursor:pointer; font-size: 18px;">✖</span>
    </div>
    <div id="aiChatMessages" class="ai-chat-messages">
        <div class="ai-msg">שלום! אני העוזר החכם של ARISH פיתוח תוכנה. אשמח לעזור לך למצוא מידע מעניין או לענות על שאלות לגבי התוכן באתר. איך אוכל לעזור?</div>
    </div>
    <div class="ai-chat-input-area">
        <input type="text" id="aiChatInput" placeholder="הקלד כאן..." onkeyup="if(event.key === 'Enter') sendChatMessage()">
        <button onclick="sendChatMessage()">➤</button>
    </div>
</div>

<div id="imageModal" class="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <img class="modal-content" id="expandedImg">
  <div id="expandedTitle"></div>
  <div id="expandedDesc"></div>
  
  <!-- כפתור ניתוח AI חדש למודל -->
  <div style="text-align: center; margin-top: 15px;">
      <button id="btnExplainProject" class="ai-btn" onclick="explainProjectWithAI()">✨ נתח והסבר פרויקט זה (AI)</button>
  </div>
  <div id="aiExplainerResult" class="ai-explainer-box" style="margin: 15px auto; max-width: 90%;"></div>
</div>

<script>
// --- הכנס כאן את כתובת ה-WebApp החדשה שלך! ---
const gasUrl = 'https://script.google.com/macros/s/AKfycbzhQ3D6LYDGmN2-WgfBSyBcQuzu6nLdxE4VmFRT2anbmzz5SU9RnTlEBEXDFxw2CS_e/exec';
// מפתח ה-API הוסר מכאן לחלוטין ועבר לשרת!

let allFiles = [];
let cardAnimClass = 'anim-float';

let currentModalTitle = "";
let currentModalDesc = "";

async function init() {
    try {
        const response = await fetch(gasUrl);
        const resData = await response.json();
        
        applySettings(resData.settings || {});
        allFiles = resData.files || [];
        document.getElementById('loader').style.display = 'none';
        renderPath(""); 
    } catch (e) {
        document.getElementById('loader').innerText = '❌ שגיאה בטעינת הנתונים.';
    }
}

function applySettings(settings) {
    const root = document.documentElement;
    document.getElementById('uiTitle').innerText = settings.title || "ARISH פיתוח תוכנה";
    document.getElementById('uiSubtitle').innerText = settings.subtitle || "ברוכים הבאים";
    document.getElementById('loader').innerText = settings.loadingText || "טוען את הנתונים... ✨";
    
    if(settings.mainColor) root.style.setProperty('--main-color', settings.mainColor);
    if(settings.bg1) root.style.setProperty('--bg-color-1', settings.bg1);
    if(settings.textColor) root.style.setProperty('--text-color', settings.textColor);
    
    if(settings.borderRadius !== undefined) root.style.setProperty('--border-radius', settings.borderRadius + 'px');
    if(settings.borderWidth !== undefined) root.style.setProperty('--border-width', settings.borderWidth + 'px');
    if(settings.cardSize) root.style.setProperty('--card-size', settings.cardSize + 'px');
    if(settings.titleSize) root.style.setProperty('--title-size', settings.titleSize + 'px');
    if(settings.textSize) root.style.setProperty('--text-size', settings.textSize + 'px');
    if(settings.font) root.style.setProperty('--font-family', settings.font);
    
    if(settings.headerAlign) root.style.setProperty('--header-align', settings.headerAlign);
    if(settings.hoverScale) root.style.setProperty('--hover-scale', settings.hoverScale);

    if(settings.defaultMode === 'dark') {
        document.body.classList.add('user-dark-mode');
        document.getElementById('darkModeBtn').innerHTML = "☀️ מצב יום";
    }
    if(settings.defaultView === 'list') document.getElementById('mainView').classList.add('list-view');
    if(settings.showSearch === 'false') document.getElementById('searchInput').style.display = 'none';

    let shadowVal = "10px", hoverVal = "25px";
    if(settings.shadow === "none") { shadowVal = "0px"; hoverVal = "5px"; }
    else if(settings.shadow === "light") { shadowVal = "5px"; hoverVal = "15px"; }
    else if(settings.shadow === "heavy") { shadowVal = "20px"; hoverVal = "40px"; }
    root.style.setProperty('--shadow-depth', shadowVal);
    root.style.setProperty('--hover-shadow', hoverVal);

    if(settings.cardAnim) cardAnimClass = 'anim-' + settings.cardAnim;
    if(settings.textAnim && settings.textAnim !== 'none') document.getElementById('headerSection').classList.add('text-anim-' + settings.textAnim);
}

function renderPath(path) {
    const view = document.getElementById('mainView');
    view.innerHTML = "";
    document.getElementById('searchInput').value = "";
    updateBreadcrumbs(path);
    
    const pathParts = path ? path.split('/') : [];
    const depth = pathParts.length;
    
    const foldersFound = new Set();
    const itemsToRender = [];
    
    allFiles.forEach(file => {
        const fileParts = file.projectName.split('/');
        let isMatch = true;
        for(let i=0; i<depth; i++) if(fileParts[i] !== pathParts[i]) isMatch = false;
        if(isMatch) {
            if(fileParts.length > depth) foldersFound.add(fileParts[depth]);
            else itemsToRender.push(file);
        }
    });

    if(foldersFound.size > 0 || itemsToRender.length > 0) {
        const summaryDiv = document.createElement('div');
        summaryDiv.style.gridColumn = '1 / -1';
        summaryDiv.style.textAlign = 'center';
        summaryDiv.style.marginBottom = '20px';
        const uniqueId = 'folderSummaryText_' + depth;
        summaryDiv.innerHTML = `
            <button class="ai-btn" style="font-size: 16px; padding: 12px 30px;" onclick="summarizeCurrentFolder('${path}', '${uniqueId}', this)">✨ סכם את תוכן התיקייה</button>
            <div id="${uniqueId}" style="display:none; background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid #9b59b6; color: var(--text-color); text-align: right; line-height: 1.6; margin-top: 15px; box-shadow: 0 4px 15px var(--shadow-color); font-size: 16px;"></div>
        `;
        view.appendChild(summaryDiv);
    }
    
    foldersFound.forEach(folderName => {
        const nextPath = path ? path + '/' + folderName : folderName;
        const div = document.createElement('div');
        div.className = `folder-card ${cardAnimClass}`;
        div.onclick = () => renderPath(nextPath);
        div.innerHTML = `<div class="folder-icon">📂</div><div class="folder-name">${folderName}</div><div class="click-indicator">👆 פתח תיקייה</div>`;
        view.appendChild(div);
    });
    
    itemsToRender.forEach(item => {
        const card = document.createElement('div');
        if(item.githubPath === "LINK") {
            card.className = `item-card link-card ${cardAnimClass}`;
            card.onclick = () => window.open(item.fileUrl, '_blank');
            card.innerHTML = `<div class="file-icon">🔗</div><div class="item-name">${item.fileName}</div><div class="desc-text">${item.description}</div><div class="click-indicator">👆 פתח קישור</div>`;
        } else {
            card.className = `item-card ${cardAnimClass}`;
            const isImage = item.fileName.match(/\.(jpeg|jpg|gif|png|webp)$/i) != null;
            const isHtml = item.fileName.match(/\.(html|htm)$/i) != null;
            
            card.onclick = (e) => { 
                if(e.target.closest('.download-btn')) return;
                if(isImage) openModal(item.fileUrl, item.fileName, item.description); 
                else window.open(item.fileUrl, '_self'); 
            };
            
            let contentHTML = "";
            if (isImage) {
                const urlParts = item.fileUrl.split('/');
                const thumbUrl = urlParts.join('/') + '/thumb_' + urlParts.pop();
                contentHTML = `<img class="item-image" src="${thumbUrl}" onerror="this.src='${item.fileUrl}'">`;
            } else if (isHtml) {
                contentHTML = `<div class="html-preview-container"><iframe src="${item.fileUrl}" scrolling="no" tabindex="-1"></iframe></div>`;
            } else { contentHTML = `<div class="file-icon">📄</div>`; }
            
            card.innerHTML = `
                <a href="${item.fileUrl}" download="${item.fileName}" class="download-btn" target="_blank" title="הורד קובץ">⬇️</a>
                ${contentHTML}
                <div class="item-name">${item.fileName}</div>
                ${item.description ? `<div class="desc-text">${item.description}</div>` : ''}
                <div class="click-indicator">👆 לחץ לפתיחה</div>
            `;
        }
        view.appendChild(card);
    });
    
    if(foldersFound.size === 0 && itemsToRender.length === 0) view.innerHTML += "<h3 style='grid-column: 1/-1; text-align:center;'>התיקייה ריקה</h3>";
}

function updateBreadcrumbs(path) {
    const bc = document.getElementById('breadcrumbs');
    if(!path) { bc.style.display = 'none'; return; }
    bc.style.display = 'block';
    let html = `<span onclick="renderPath('')">🏠 ראשי</span>`;
    let currentPath = "";
    path.split('/').forEach((part, index) => {
        currentPath += (index === 0 ? part : '/' + part);
        html += `<span class="separator">/</span> <span onclick="renderPath('${currentPath}')">📂 ${part}</span>`;
    });
    bc.innerHTML = html;
}

function filterItems() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const cards = document.getElementById('mainView').children;
    for(let card of cards) {
        if(card.tagName === 'H3' || card.classList.contains('folder-summary-box')) continue;
        const text = card.innerText.toLowerCase();
        if(text.includes(query)) card.style.display = '';
        else card.style.display = 'none';
    }
}

function toggleListView() {
    const grid = document.getElementById('mainView');
    grid.classList.toggle('list-view');
}

function toggleDarkMode() {
    document.body.classList.toggle('user-dark-mode');
    const btn = document.getElementById('darkModeBtn');
    if(document.body.classList.contains('user-dark-mode')) {
        btn.innerHTML = "☀️ מצב יום";
    } else {
        btn.innerHTML = "🌙 מצב לילה אישי";
    }
}

function openModal(src, title, desc) {
    document.getElementById("imageModal").style.display = "block";
    document.getElementById("expandedImg").src = src;
    document.getElementById("expandedTitle").innerText = title;
    document.getElementById("expandedDesc").innerText = desc || "";
    currentModalTitle = title;
    currentModalDesc = desc || "";

    document.getElementById('aiExplainerResult').style.display = 'none';
    document.getElementById('aiExplainerResult').innerText = '';
    document.getElementById('btnExplainProject').style.display = 'inline-block';
}

function closeModal() { document.getElementById("imageModal").style.display = "none"; }

// --- פונקציות העוזר החכם של Gemini (בקשות מאובטחות דרך השרת) ---
function toggleAIChat() {
    const chatWin = document.getElementById('aiChatWindow');
    chatWin.style.display = chatWin.style.display === 'flex' ? 'none' : 'flex';
}

function appendChatMessage(text, sender) {
    const msgs = document.getElementById('aiChatMessages');
    const msgDiv = document.createElement('div');
    msgDiv.className = sender === 'user' ? 'user-msg' : 'ai-msg';
    msgDiv.innerText = text;
    const id = 'msg_' + Date.now();
    msgDiv.id = id;
    msgs.appendChild(msgDiv);
    msgs.scrollTop = msgs.scrollHeight;
    return id;
}

function updateChatMessage(id, text) {
    const msgDiv = document.getElementById(id);
    if(msgDiv) {
        msgDiv.innerText = text;
        const msgs = document.getElementById('aiChatMessages');
        msgs.scrollTop = msgs.scrollHeight;
    }
}

// קריאה מאובטחת לשרת במקום פנייה ישירה לגוגל
async function callGeminiAPI(promptText, systemPromptOverride = null) {
    const galleryItems = allFiles.map(f => `- תיקייה: ${f.projectName} | קובץ: ${f.fileName} | תיאור: ${f.description || 'ללא תיאור'}`).join('\n');
    const defaultSystemPrompt = `אתה עוזר וירטואלי חכם ואדיב הנמצא באתר של ARISH פיתוח תוכנה.
תפקידך לעזור למבקרים באתר למצוא את מה שהם מחפשים ולענות על שאלותיהם בהתבסס אך ורק על רשימת הפריטים הזו:
${galleryItems}
אם שואלים אותך על פריט שלא נמצא ברשימה, אמור שאינך רואה אותו באתר כרגע. ענה בקצרה, בצורה שיווקית ומזמינה, ותמיד בשפה העברית, צחה ומכובדת בלבד.`;

    const formData = new URLSearchParams();
    formData.append('action', 'askGemini');
    formData.append('promptText', promptText);
    formData.append('systemInstruction', systemPromptOverride || defaultSystemPrompt);

    let delay = 1000;
    for (let attempt = 0; attempt < 5; attempt++) {
        try {
            const response = await fetch(gasUrl, {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            if (result.status === 'success') {
                return result.text;
            } else {
                throw new Error(result.message);
            }
        } catch (error) {
            if (attempt === 4) throw error;
            await new Promise(r => setTimeout(r, delay));
            delay *= 2; 
        }
    }
}

async function sendChatMessage() {
    const input = document.getElementById('aiChatInput');
    const text = input.value.trim();
    if(!text) return;

    appendChatMessage(text, 'user');
    input.value = '';
    const typingId = appendChatMessage('✨ חושב...', 'ai');

    try {
        const aiResponse = await callGeminiAPI(text);
        updateChatMessage(typingId, aiResponse);
    } catch(e) {
        updateChatMessage(typingId, '❌ מצטער, אירעה שגיאה בתקשורת עם הבינה המלאכותית. נסה שוב מאוחר יותר.');
    }
}

async function explainProjectWithAI() {
    const btn = document.getElementById('btnExplainProject');
    const resultBox = document.getElementById('aiExplainerResult');
    btn.style.display = 'none';
    resultBox.style.display = 'block';
    resultBox.innerText = '✨ הבינה המלאכותית מנתחת את הפרויקט... ⏳';

    const promptText = `כתוב הסבר שיווקי, מקצועי ומרשים (כ-2 עד 3 משפטים) על פרויקט התוכנה הבא של העסק 'ARISH פיתוח תוכנה'.
שם הפרויקט: ${currentModalTitle}
תיאור: ${currentModalDesc}
הדגש את הערך שהפרויקט נותן והשתמש בשפה מזמינה עם 2 אמוג'ים מתאימים לכל היותר.`;

    try {
        const aiResponse = await callGeminiAPI(promptText, "אתה קופירייטר ומנתח מערכות תוכנה בכיר. כתוב בשפה נקייה, מקצועית ומכובדת בלבד.");
        resultBox.innerText = aiResponse;
    } catch (e) {
        resultBox.innerText = '❌ אירעה שגיאה בטעינת הניתוח. נסה שוב מאוחר יותר.';
        btn.style.display = 'inline-block';
    }
}

async function summarizeCurrentFolder(path, textElementId, btnElement) {
    const pathParts = path ? path.split('/') : [];
    const depth = pathParts.length;
    const items = [];
    allFiles.forEach(file => {
        const fileParts = file.projectName.split('/');
        let isMatch = true;
        for(let i=0; i<depth; i++) if(fileParts[i] !== pathParts[i]) isMatch = false;
        if(isMatch && fileParts.length === depth) items.push(file);
    });

    const textDiv = document.getElementById(textElementId);
    btnElement.style.display = 'none';
    textDiv.style.display = 'block';
    textDiv.innerText = '✨ קורא את הקבצים ומייצר סיכום... ⏳';

    const itemsContext = items.map(i => `- ${i.fileName}: ${i.description || 'ללא תיאור'}`).join('\n');
    const promptText = `סכם במשפט אחד או שניים את סוג הפרויקטים והעבודות שיש בתיקייה זו, כדי לעזור למבקר להבין את הערך של 'ARISH פיתוח תוכנה' בתיקייה זו.
רשימת הפריטים בתיקייה:
${itemsContext || 'אין פריטים ישירים, קיימות רק תתי תיקיות.'}`;

    try {
        const aiResponse = await callGeminiAPI(promptText, "אתה עוזר וירטואלי המציג את תיק העבודות. ענה בעברית צחה, מקצועית, נקייה ומכובדת בלבד.");
        textDiv.innerText = aiResponse;
    } catch (e) {
        textDiv.innerText = '❌ אירעה שגיאה ביצירת הסיכום.';
        btnElement.style.display = 'inline-block';
    }
}

window.onload = init;
