<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הגלריה שלי</title>
<style>
    /* עיצוב ואנימציות */
    .gallery-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
    }
    .item-card {
        border: 2px solid transparent;
        border-radius: 8px;
        padding: 10px;
        text-align: center;
        cursor: pointer;
        transition: all 0.4s ease; /* הגדרת האנימציה */
        background-color: #f9f9f9;
        width: 150px;
    }
    /* האנימציה המגניבה שביקשת במעבר עכבר */
    .item-card:hover {
        transform: scale(1.08) rotate(3deg);
        border-color: #4CAF50; /* צבע המסגרת משתנה */
        box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }
    .item-image {
        max-width: 100%;
        border-radius: 4px;
    }
    .download-btn {
        display: inline-block;
        margin-top: 10px;
        padding: 5px 10px;
        background-color: #2196F3;
        color: white;
        text-decoration: none;
        border-radius: 4px;
    }
    /* עיצוב למודל (החלון הקופץ לתמונות) */
    .modal {
        display: none; position: fixed; z-index: 1000; left: 0; top: 0;
        width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.8);
    }
    .modal-content {
        margin: auto; display: block; width: 80%; max-width: 700px; margin-top: 50px;
    }
    .close {
        position: absolute; top: 15px; right: 35px; color: #f1f1f1;
        font-size: 40px; font-weight: bold; cursor: pointer;
    }
    #expandedTitle {
        text-align: center; color: white; margin-top: 10px; font-size: 20px;
    }
</style>
</head>
<body>

<div id="loader">טוען נתונים... ⏳</div>
<div id="projectsContainer"></div>

<div id="imageModal" class="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <img class="modal-content" id="expandedImg">
  <div id="expandedTitle"></div>
</div>

<script>
const gasUrl = 'https://script.google.com/macros/s/AKfycbzhQ3D6LYDGmN2-WgfBSyBcQuzu6nLdxE4VmFRT2anbmzz5SU9RnTlEBEXDFxw2CS_e/exec';

async function loadProjects() {
    try {
        const response = await fetch(gasUrl);
        const data = await response.json();
        document.getElementById('loader').style.display = 'none';
        
        const projects = {};
        data.forEach(item => {
            if (!projects[item.projectName]) { projects[item.projectName] = []; }
            projects[item.projectName].push(item);
        });

        const container = document.getElementById('projectsContainer');
        
        for (const [projectName, items] of Object.entries(projects)) {
            const section = document.createElement('div');
            section.className = 'project-section';
            
            const title = document.createElement('h2');
            title.className = 'project-title';
            title.innerText = '📁 ' + projectName;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'gallery-grid';

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                
                const isImage = item.fileName.match(/\.(jpeg|jpg|gif|png|webp)$/i) != null;
                
                if (isImage) {
                    const urlParts = item.fileUrl.split('/');
                    const fileNameEncoded = urlParts.pop();
                    const thumbUrl = urlParts.join('/') + '/thumb_' + fileNameEncoded;

                    card.innerHTML = `
                        <img class="item-image" src="${thumbUrl}" alt="${item.fileName}" onclick="openModal('${item.fileUrl}', '${item.fileName}')">
                        <div><strong>${item.fileName}</strong></div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="file-icon">📄</div>
                        <div><strong>${item.fileName}</strong></div>
                        <a href="${item.fileUrl}" class="download-btn" target="_self">הורד / פתח קובץ</a>
                    `;
                }
                grid.appendChild(card);
            });
            section.appendChild(grid);
            container.appendChild(section);
        }
    } catch (error) {
        document.getElementById('loader').innerText = '❌ שגיאה בטעינת הנתונים.';
        console.error(error);
    }
}

function openModal(fullSizeSrc, titleText) {
    let modal = document.getElementById("imageModal");
    modal.style.display = "block";
    document.getElementById("expandedImg").src = fullSizeSrc;
    document.getElementById("expandedTitle").innerText = titleText;
}

function closeModal() { 
    document.getElementById("imageModal").style.display = "none"; 
}

window.onload = loadProjects;
</script>

</body>
</html>
