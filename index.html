<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הגלריה שלי</title>
<style>
    :root {
        --main-color: #1abc9c;
        --bg-color-1: #f5f7fa;
        --bg-color-2: #c3cfe2;
        --border-radius: 16px;
        --border-width: 2px;
        --shadow-depth: 10px;
        --shadow-color: rgba(0,0,0,0.08);
        --hover-shadow: 25px;
    }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, var(--bg-color-1) 0%, var(--bg-color-2) 100%);
        color: #333; margin: 0; padding: 30px; min-height: 100vh;
        transition: background 0.5s;
    }
    
    .site-header { text-align: center; margin-bottom: 40px; }
    .site-header h1 { color: var(--main-color); font-size: 3em; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
    .site-header p { font-size: 1.2em; color: #555; }
    
    #loader { text-align: center; font-size: 1.5em; color: var(--main-color); margin: 50px 0; font-weight: bold; }
    
    /* Navigation Breadcrumbs */
    .breadcrumbs { background: rgba(255,255,255,0.7); padding: 10px 20px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; font-size: 18px; }
    .breadcrumbs span { cursor: pointer; color: var(--main-color); transition: 0.3s; }
    .breadcrumbs span:hover { text-decoration: underline; color: #333; }
    .breadcrumbs .separator { margin: 0 10px; color: #888; cursor: default; }

    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 30px; }
    
    /* כרטיסיות כלליות */
    .item-card, .folder-card {
        background: #ffffff;
        border-radius: var(--border-radius);
        padding: 20px; text-align: center; cursor: pointer;
        display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        position: relative;
        border: var(--border-width) solid transparent;
        box-shadow: 0 var(--shadow-depth) calc(var(--shadow-depth)*2) var(--shadow-color);
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, border-color 0.3s ease;
    }
    
    .item-card:hover, .folder-card:hover {
        transform: translateY(-8px) scale(1.02);
        border-color: var(--main-color);
        box-shadow: 0 var(--hover-shadow) calc(var(--hover-shadow)*1.5) rgba(0,0,0,0.15);
    }
    
    /* תיקיות */
    .folder-card { background: linear-gradient(to bottom, #fff, #f8f9fa); }
    .folder-icon { font-size: 70px; margin-bottom: 10px; }
    .folder-name { font-size: 20px; font-weight: bold; color: var(--main-color); }
    
    /* חלוניות טקסט / קישורים */
    .link-card {
        background: linear-gradient(135deg, var(--main-color), #2c3e50);
        color: white; border: var(--border-width) solid rgba(255,255,255,0.3);
    }
    .link-card .item-name { color: white; font-size: 22px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
    .link-card .desc-text { color: #ecf0f1; font-size: 15px; margin-top: 10px; }
    .link-card .file-icon { color: white; font-size: 50px; }

    .item-image { max-width: 100%; height: 160px; object-fit: cover; border-radius: calc(var(--border-radius) / 2); margin-bottom: 15px; }
    .html-preview-container { width: 100%; height: 160px; overflow: hidden; border-radius: calc(var(--border-radius) / 2); margin-bottom: 15px; border: 1px solid #eee; }
    .html-preview-container iframe { width: 400%; height: 400%; border: none; transform: scale(0.25); transform-origin: top right; pointer-events: none; }
    
    .file-icon { font-size: 60px; margin-bottom: 15px; color: #95a5a6; }
    .item-name { font-size: 18px; font-weight: bold; color: #34495e; word-break: break-all; }
    .desc-text { font-size: 14px; color: #7f8c8d; margin-top: 8px; line-height: 1.4; }
    .click-indicator { margin-top: 15px; font-size: 13px; color: var(--main-color); font-weight: bold; opacity: 0; transition: opacity 0.3s; background: rgba(255,255,255,0.8); padding: 5px 10px; border-radius: 20px; }
    .item-card:hover .click-indicator, .folder-card:hover .click-indicator { opacity: 1; }

    /* אנימציות דינמיות */
    .animating .item-card, .animating .folder-card { animation: floating 4s infinite ease-in-out alternate; }
    .animating .item-card:nth-child(even) { animation-delay: -2s; }
    @keyframes floating { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
    
    /* מודל לתמונות */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
    .modal-content { margin: auto; display: block; max-width: 90%; max-height: 80vh; margin-top: 5vh; border-radius: 12px; border: 3px solid var(--main-color); }
    .close { position: absolute; top: 20px; right: 40px; color: #fff; font-size: 50px; font-weight: bold; cursor: pointer; }
    .close:hover { color: var(--main-color); }
    #expandedTitle { text-align: center; color: white; margin-top: 15px; font-size: 22px; }
    #expandedDesc { text-align: center; color: #ccc; font-size: 16px; margin-top: 5px; }

    /* כפתור שליטה באנימציות */
    #animToggleBtn { position: fixed; bottom: 20px; left: 20px; background: var(--main-color); color: white; border: none; border-radius: 50px; padding: 15px 25px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 100; transition: 0.3s; }
    #animToggleBtn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<div class="site-header">
    <h1 id="uiTitle">הגלריה המרהיבה שלי</h1>
    <p id="uiSubtitle">טוען נתונים...</p>
</div>

<div class="breadcrumbs" id="breadcrumbs" style="display:none;"></div>
<div id="loader">טוען את הגלריה... ✨</div>
<div id="mainView" class="gallery-grid"></div>

<button id="animToggleBtn" onclick="toggleAnimations()">⏸️ עצור תנועה</button>

<div id="imageModal" class="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <img class="modal-content" id="expandedImg">
  <div id="expandedTitle"></div>
  <div id="expandedDesc"></div>
</div>

<script>
// --- הכנס כאן את כתובת ה-WebApp החדשה שלך! ---
const gasUrl = 'https://script.google.com/macros/s/AKfycbzhQ3D6LYDGmN2-WgfBSyBcQuzu6nLdxE4VmFRT2anbmzz5SU9RnTlEBEXDFxw2CS_e/exec';

let allFiles = [];
let isAnimating = true;

async function init() {
    try {
        const response = await fetch(gasUrl);
        const resData = await response.json();
        
        applySettings(resData.settings || {});
        
        allFiles = resData.files || [];
        document.getElementById('loader').style.display = 'none';
        
        renderPath(""); // מציג את דף הבית
    } catch (e) {
        document.getElementById('loader').innerText = '❌ שגיאה בטעינת הנתונים.';
    }
}

function applySettings(settings) {
    const root = document.documentElement;
    if(settings.title) document.getElementById('uiTitle').innerText = settings.title;
    if(settings.subtitle) document.getElementById('uiSubtitle').innerText = settings.subtitle;
    if(settings.mainColor) root.style.setProperty('--main-color', settings.mainColor);
    if(settings.bg1) root.style.setProperty('--bg-color-1', settings.bg1);
    if(settings.borderRadius) root.style.setProperty('--border-radius', settings.borderRadius + 'px');
    if(settings.borderWidth) root.style.setProperty('--border-width', settings.borderWidth + 'px');
    
    let shadowVal = "10px", hoverVal = "25px";
    if(settings.shadow === "none") { shadowVal = "0px"; hoverVal = "5px"; }
    else if(settings.shadow === "light") { shadowVal = "5px"; hoverVal = "15px"; }
    else if(settings.shadow === "heavy") { shadowVal = "20px"; hoverVal = "40px"; }
    root.style.setProperty('--shadow-depth', shadowVal);
    root.style.setProperty('--hover-shadow', hoverVal);

    if(settings.animations === "false") { toggleAnimations(); }
    else { document.getElementById('mainView').classList.add('animating'); }
}

function toggleAnimations() {
    const view = document.getElementById('mainView');
    const btn = document.getElementById('animToggleBtn');
    isAnimating = !isAnimating;
    if(isAnimating) {
        view.classList.add('animating');
        btn.innerHTML = "⏸️ עצור תנועה";
    } else {
        view.classList.remove('animating');
        btn.innerHTML = "▶️ הפעל תנועה";
    }
}

// פונקציה לניווט בתתי תיקיות
function renderPath(path) {
    const view = document.getElementById('mainView');
    view.innerHTML = "";
    updateBreadcrumbs(path);
    
    // חישוב עומק נוכחי
    const pathParts = path ? path.split('/') : [];
    const depth = pathParts.length;
    
    // מציאת אילו תיקיות ואילו קבצים צריכים להיות מוצגים ברמה זו
    const foldersFound = new Set();
    const itemsToRender = [];
    
    allFiles.forEach(file => {
        const fileParts = file.projectName.split('/');
        
        // בודק אם הקובץ יושב בדיוק בנתיב הנוכחי או בתוך תת תיקיה שלו
        let isMatch = true;
        for(let i=0; i<depth; i++) {
            if(fileParts[i] !== pathParts[i]) isMatch = false;
        }
        
        if(isMatch) {
            if(fileParts.length > depth) {
                // זה נמצא בתוך תת-תיקייה
                foldersFound.add(fileParts[depth]);
            } else {
                // זה קובץ ישיר ברמה הנוכחית
                itemsToRender.push(file);
            }
        }
    });
    
    // ציור תיקיות
    foldersFound.forEach(folderName => {
        const nextPath = path ? path + '/' + folderName : folderName;
        const div = document.createElement('div');
        div.className = 'folder-card';
        div.onclick = () => renderPath(nextPath);
        div.innerHTML = `
            <div class="folder-icon">📂</div>
            <div class="folder-name">${folderName}</div>
            <div class="click-indicator">👆 פתח תיקייה</div>
        `;
        view.appendChild(div);
    });
    
    // ציור קבצים וכרטיסיות טקסט
    itemsToRender.forEach(item => {
        const card = document.createElement('div');
        
        if(item.githubPath === "LINK") {
            // כרטיסיית חלון טקסט מקשר
            card.className = 'item-card link-card';
            card.onclick = () => window.open(item.fileUrl, '_blank');
            card.innerHTML = `
                <div class="file-icon">🔗</div>
                <div class="item-name">${item.fileName}</div>
                <div class="desc-text">${item.description}</div>
                <div class="click-indicator">👆 פתח קישור חיצוני</div>
            `;
        } else {
            // קובץ רגיל (תמונה, html, וכו)
            card.className = 'item-card';
            const isImage = item.fileName.match(/\.(jpeg|jpg|gif|png|webp)$/i) != null;
            const isHtml = item.fileName.match(/\.(html|htm)$/i) != null;
            
            card.onclick = () => {
                if(isImage) openModal(item.fileUrl, item.fileName, item.description);
                else window.open(item.fileUrl, '_self');
            };
            
            let contentHTML = "";
            if (isImage) {
                const urlParts = item.fileUrl.split('/');
                const fileNameEncoded = urlParts.pop();
                const thumbUrl = urlParts.join('/') + '/thumb_' + fileNameEncoded;
                contentHTML = `<img class="item-image" src="${thumbUrl}" onerror="this.src='${item.fileUrl}'">`;
            } else if (isHtml) {
                contentHTML = `<div class="html-preview-container"><iframe src="${item.fileUrl}" scrolling="no" tabindex="-1"></iframe></div>`;
            } else {
                contentHTML = `<div class="file-icon">📄</div>`;
            }
            
            card.innerHTML = `
                ${contentHTML}
                <div class="item-name">${item.fileName}</div>
                ${item.description ? `<div class="desc-text">${item.description}</div>` : ''}
                <div class="click-indicator">👆 לחץ להגדלה/פתיחה</div>
            `;
        }
        view.appendChild(card);
    });
    
    if(foldersFound.size === 0 && itemsToRender.length === 0) {
        view.innerHTML = "<h3 style='grid-column: 1/-1; text-align:center;'>התיקייה ריקה</h3>";
    }
}

function updateBreadcrumbs(path) {
    const bc = document.getElementById('breadcrumbs');
    if(!path) { bc.style.display = 'none'; return; }
    
    bc.style.display = 'block';
    let html = `<span onclick="renderPath('')">🏠 ראשי</span>`;
    
    const parts = path.split('/');
    let currentPath = "";
    parts.forEach((part, index) => {
        currentPath += (index === 0 ? part : '/' + part);
        html += `<span class="separator">/</span> <span onclick="renderPath('${currentPath}')">${part}</span>`;
    });
    
    bc.innerHTML = html;
}

function openModal(src, title, desc) {
    document.getElementById("imageModal").style.display = "block";
    document.getElementById("expandedImg").src = src;
    document.getElementById("expandedTitle").innerText = title;
    document.getElementById("expandedDesc").innerText = desc || "";
}

function closeModal() { document.getElementById("imageModal").style.display = "none"; }

window.onload = init;
</script>
</body>
</html>
