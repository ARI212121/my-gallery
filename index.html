<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הגלריה שלי - תצוגה מרהיבה</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        color: #333;
        margin: 0; padding: 30px;
        min-height: 100vh;
    }
    #loader {
        text-align: center; font-size: 1.5em; color: #2c3e50; margin: 50px 0; font-weight: bold;
    }
    .project-section {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 20px; 
        padding: 30px;
        margin-bottom: 40px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        border: 1px solid rgba(255,255,255,0.5);
    }
    .project-title {
        margin-top: 0; color: #1abc9c; border-bottom: 3px solid #1abc9c;
        padding-bottom: 10px; margin-bottom: 30px; font-size: 28px;
        display: inline-block;
    }
    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 30px;
    }
    
    /* עיצוב הכרטיסיות המתקדם */
    .item-card {
        background: #ffffff;
        border-radius: 16px;
        padding: 20px; 
        text-align: center; 
        cursor: pointer;
        display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        position: relative;
        overflow: hidden;
        border: none;
        box-shadow: 5px 5px 15px rgba(0,0,0,0.05), -5px -5px 15px rgba(255,255,255,0.8);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    /* אפקט האור החולף (Shine) */
    .item-card::before {
        content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.8), transparent);
        transform: skewX(-25deg); transition: all 0.7s ease; z-index: 1;
    }
    
    /* מה קורה במעבר עכבר */
    .item-card:hover {
        transform: translateY(-12px) scale(1.03);
        box-shadow: 0 20px 30px rgba(26, 188, 156, 0.2);
    }
    .item-card:hover::before {
        left: 150%; /* מריץ את פס האור */
    }

    .item-image {
        max-width: 100%; height: 140px; object-fit: cover;
        border-radius: 10px; margin-bottom: 15px; z-index: 2; position: relative;
    }
    .html-preview-container {
        width: 100%; height: 140px; overflow: hidden;
        border-radius: 10px; margin-bottom: 15px; position: relative;
        border: 2px solid #ecf0f1; background: #fafafa; z-index: 2;
    }
    .html-preview-container iframe {
        width: 400%; height: 400%; border: none;
        transform: scale(0.25); transform-origin: top right;
        pointer-events: none;
    }
    .file-icon {
        font-size: 60px; margin-bottom: 15px; color: #95a5a6; z-index: 2; position: relative;
    }
    .item-name {
        font-size: 16px; font-weight: bold; color: #34495e; z-index: 2; position: relative;
        word-break: break-all;
    }
    .click-indicator {
        margin-top: 10px; font-size: 12px; color: #1abc9c; font-weight: bold;
        opacity: 0; transition: opacity 0.3s; z-index: 2; position: relative;
    }
    .item-card:hover .click-indicator { opacity: 1; }
    
    /* מודל לתמונות */
    .modal {
        display: none; position: fixed; z-index: 1000; left: 0; top: 0;
        width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.9);
        backdrop-filter: blur(5px);
    }
    .modal-content {
        margin: auto; display: block; max-width: 90%; max-height: 80vh; margin-top: 5vh; border-radius: 12px;
        box-shadow: 0 0 40px rgba(255,255,255,0.2);
    }
    .close {
        position: absolute; top: 20px; right: 40px; color: #fff;
        font-size: 50px; font-weight: bold; cursor: pointer; transition: color 0.3s;
    }
    .close:hover { color: #1abc9c; }
    #expandedTitle { text-align: center; color: white; margin-top: 20px; font-size: 24px; font-weight: bold; }
</style>
</head>
<body>

<div id="loader">טוען את הגלריה המרהיבה... ✨</div>
<div id="projectsContainer"></div>

<div id="imageModal" class="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <img class="modal-content" id="expandedImg">
  <div id="expandedTitle"></div>
</div>

<script>
// --- החלף כאן בכתובת השרת! ---
const gasUrl = 'https://script.google.com/macros/s/AKfycbzhQ3D6LYDGmN2-WgfBSyBcQuzu6nLdxE4VmFRT2anbmzz5SU9RnTlEBEXDFxw2CS_e/exec';

async function loadProjects() {
    try {
        const response = await fetch(gasUrl);
        const data = await response.json();
        document.getElementById('loader').style.display = 'none';
        
        const projects = {};
        data.forEach(item => {
            if (!projects[item.projectName]) { projects[item.projectName] = []; }
            projects[item.projectName].push(item);
        });

        const container = document.getElementById('projectsContainer');
        
        for (const [projectName, items] of Object.entries(projects)) {
            const section = document.createElement('div');
            section.className = 'project-section';
            
            const title = document.createElement('h2');
            title.className = 'project-title';
            title.innerText = '📁 ' + projectName;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'gallery-grid';

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                
                const isImage = item.fileName.match(/\.(jpeg|jpg|gif|png|webp)$/i) != null;
                const isHtml = item.fileName.match(/\.(html|htm)$/i) != null;
                
                // לחיצה על כל הכרטיסייה פותחת את הקובץ או המודל
                card.onclick = () => {
                    if (isImage) {
                        openModal(item.fileUrl, item.fileName);
                    } else {
                        window.open(item.fileUrl, '_self');
                    }
                };
                
                if (isImage) {
                    const urlParts = item.fileUrl.split('/');
                    const fileNameEncoded = urlParts.pop();
                    const thumbUrl = urlParts.join('/') + '/thumb_' + fileNameEncoded;

                    card.innerHTML = `
                        <img class="item-image" src="${thumbUrl}" alt="${item.fileName}" onerror="this.src='${item.fileUrl}'">
                        <div class="item-name">${item.fileName}</div>
                        <div class="click-indicator">👆 לחץ להגדלה</div>
                    `;
                } else if (isHtml) {
                    card.innerHTML = `
                        <div class="html-preview-container">
                            <iframe src="${item.fileUrl}" scrolling="no" tabindex="-1"></iframe>
                        </div>
                        <div class="item-name">${item.fileName}</div>
                        <div class="click-indicator">👆 לחץ לפתיחת האתר</div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="file-icon">📄</div>
                        <div class="item-name">${item.fileName}</div>
                        <div class="click-indicator">👆 לחץ לפתיחת הקובץ</div>
                    `;
                }
                grid.appendChild(card);
            });
            section.appendChild(grid);
            container.appendChild(section);
        }
    } catch (error) {
        document.getElementById('loader').innerText = '❌ שגיאה בטעינת הנתונים.';
        console.error(error);
    }
}

function openModal(fullSizeSrc, titleText) {
    let modal = document.getElementById("imageModal");
    modal.style.display = "block";
    document.getElementById("expandedImg").src = fullSizeSrc;
    document.getElementById("expandedTitle").innerText = titleText;
}

function closeModal() { document.getElementById("imageModal").style.display = "none"; }
window.onload = loadProjects;
</script>

</body>
</html>
