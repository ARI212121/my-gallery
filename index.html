<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הגלריה והפרויקטים שלי</title>
    <style>
        /* מעבר צבעים מהמם לרקע */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            text-align: center; 
            margin: 0; 
            padding: 30px; 
        }
        
        h1, h2 { 
            color: #ff477e; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2); 
            margin-bottom: 5px;
        }

        h1 { font-size: 45px; }
        h2 { font-size: 35px; }

        p {
            color: #555;
            font-size: 20px;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.6);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 20px;
        }

        /* --- אזור הגלריה --- */
        .gallery { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 40px; 
            margin-top: 30px; 
        }
        
        .image-frame {
            background-color: white;
            padding: 15px;
            border-radius: 20px;
            border: 6px solid white; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.4s ease; 
        }
        
        .gallery img {
            width: 260px;
            height: 220px;
            object-fit: cover; 
            border-radius: 10px;
            cursor: pointer; 
        }

        /* אפקטים לגלריה */
        .image-frame:nth-child(1):hover { transform: scale(1.1) rotate(3deg); background-color: #ffe066; border-color: #f77f00; }
        .image-frame:nth-child(2):hover { transform: scale(1.1) rotate(-3deg); background-color: #90e0ef; border-color: #0077b6; }
        .image-frame:nth-child(3):hover { transform: scale(1.1) rotate(3deg); background-color: #b7e4c7; border-color: #2d6a4f; }

        /* --- אזור הדפים הנוספים (מיני-דפים) --- */
        .pages-section {
            margin-top: 70px;
            padding-top: 30px;
            border-top: 4px dashed rgba(255, 71, 126, 0.5); 
        }

        .pages-gallery {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .mini-page-link {
            display: block;
            width: 300px;
            height: 200px;
            overflow: hidden; 
            border-radius: 15px;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            position: relative;
            transition: transform 0.3s ease;
            text-decoration: none; 
            background-color: white;
        }

        .mini-page-link:hover {
            transform: scale(1.08);
            border-color: #ff477e; 
        }

        .mini-page-iframe {
            width: 1200px;
            height: 800px;
            border: none;
            transform: scale(0.25);
            transform-origin: top right; 
            pointer-events: none; 
        }
        
        .page-title {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(255, 71, 126, 0.9);
            color: white;
            text-align: center;
            padding: 10px 0;
            font-size: 18px;
            font-weight: bold;
            margin: 0;
        }

        /* --- חלון ההגדלה לתמונות --- */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); 
        }
        .modal-content {
            margin: 3% auto; display: block; max-width: 85%; max-height: 85vh;
            border-radius: 15px; border: 5px solid #ff477e; box-shadow: 0 0 30px rgba(255, 71, 126, 0.6);
        }
        .close {
            position: absolute; top: 20px; right: 40px; color: white; font-size: 60px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .close:hover { color: #ff477e; transform: scale(1.2); }
    </style>
</head>
<body>

    <h1>הגלריה הצבעונית שלי</h1>
    <p>העבר את העכבר על התמונות ולחץ כדי להגדיל!</p>

    <div class="gallery">
        <div class="image-frame">
            <img src="images/pic1-small.jpg" alt="תמונה 1" onclick="openModal('images/pic1-large.jpg')">
        </div>
        <div class="image-frame">
            <img src="images/pic2-small.jpg" alt="תמונה 2" onclick="openModal('images/pic2-large.jpg')">
        </div>
        <div class="image-frame">
            <img src="images/pic3-small.jpg" alt="תמונה 3" onclick="openModal('images/pic3-large.jpg')">
        </div>
    </div>

    <div class="pages-section">
        <h2>הדפים הנוספים שלי</h2>
        <p>לחץ על חלון תצוגה כדי לעבור לדף המלא</p>
        
        <div class="pages-gallery">
            <a href="page1.html" class="mini-page-link">
                <iframe src="page1.html" class="mini-page-iframe"></iframe>
                <div class="page-title">דף הפרויקט הראשון</div>
            </a>

            <a href="page2.html" class="mini-page-link">
                <iframe src="page2.html" class="mini-page-iframe"></iframe>
                <div class="page-title">דף הפרויקט השני</div>
            </a>
        </div>
    </div>

    <div id="imageModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="expandedImg">
    </div>

    <script>
        // הפונקציה עכשיו מקבלת את הנתיב המדויק של התמונה הגדולה
        function openModal(highResImageSrc) {
            document.getElementById("imageModal").style.display = "block";
            document.getElementById("expandedImg").src = highResImageSrc;
        }
        
        function closeModal() {
            document.getElementById("imageModal").style.display = "none";
        }
    </script>
</body>
</html>
